<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Super Pixel Adventure</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}
#menu{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#1a1a2e,#16213e,#0f3460);z-index:100;font-family:'Courier New',monospace}
#menu.hidden{display:none}
#menu h1{font-size:clamp(32px,8vw,72px);color:#f5c842;text-shadow:4px 4px 0 #c0392b;margin-bottom:6px;letter-spacing:2px;animation:bounce 1.2s infinite alternate}
#menu h2{font-size:clamp(14px,3vw,28px);color:#fff;text-shadow:2px 2px 0 #c0392b;margin-bottom:30px}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
#startBtn{font-family:'Courier New',monospace;font-size:clamp(18px,4vw,36px);font-weight:bold;padding:14px 50px;background:#e74c3c;color:#fff;border:4px solid #c0392b;border-radius:12px;cursor:pointer;box-shadow:0 8px 0 #962d22;margin-bottom:15px;transition:all .08s}
#startBtn:active{transform:translateY(8px);box-shadow:0 2px 0 #962d22}
.controls{color:#8899aa;font-size:clamp(11px,2vw,18px);text-align:center;line-height:1.7;font-family:'Courier New',monospace;margin-top:10px;padding:12px 20px;background:rgba(0,0,0,.35);border-radius:10px}
.controls span{color:#f5c842;font-weight:bold}
#mcontrols{position:fixed;bottom:0;left:0;width:100%;display:none;z-index:90;padding:8px 10px 16px;justify-content:space-between;pointer-events:none}
#mcontrols.show{display:flex}
.mbtn{pointer-events:auto;width:clamp(56px,14vw,80px);height:clamp(56px,14vw,80px);border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);color:#fff;font-size:clamp(24px,6vw,36px);display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-tap-highlight-color:transparent}
.mbtn:active{background:rgba(255,255,255,.35)}
.dpad{display:flex;gap:6px;align-items:center}
.dcol{display:flex;flex-direction:column;gap:6px;align-items:center}
.actns{display:flex;gap:10px;align-items:center}
.jb{width:clamp(68px,17vw,96px);height:clamp(68px,17vw,96px);background:rgba(231,76,60,.35);border-color:rgba(231,76,60,.5);font-size:clamp(13px,3vw,18px);font-weight:bold;font-family:'Courier New',monospace;color:#ff6b6b}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="menu">
<h1>SUPER PIXEL</h1>
<h2>★ ADVENTURE ★</h2>
<button id="sbtn">► START GAME</button>
<div class="controls">
<span>← →</span> Move &nbsp;|&nbsp; <span>SPACE / ↑</span> Jump<br>
<span>ESC</span> Pause &nbsp;|&nbsp; <span>R</span> Restart
</div>
</div>
<div id="mcontrols">
<div class="dpad"><div class="dcol"><div class="mbtn" id="bup">▲</div></div>
<div style="display:flex;gap:6px"><div class="mbtn" id="bl">◀</div><div class="mbtn" id="br">▶</div></div></div>
<div class="actns"><div class="mbtn jb" id="bj">JUMP</div></div>
</div>
<script>
(function(){
const c=document.getElementById("c"),x=c.getContext("2d");
let W,H;
function rs(){W=c.width=innerWidth;H=c.height=innerHeight;}
rs();onresize=rs;

// ====== AUDIO ======
let act=null;
function ia(){if(!act)act=new(window.AudioContext||window.webkitAudioContext)();}
function sf(f,d,t,v){if(!act)return;try{let o=act.createOscillator(),g=act.createGain();o.type=t||"square";o.frequency.setValueAtTime(f,act.currentTime);g.gain.setValueAtTime(v||.1,act.currentTime);g.gain.exponentialRampToValueAtTime(.001,act.currentTime+d);o.connect(g);g.connect(act.destination);o.start();o.stop(act.currentTime+d)}catch(e){}}
function pj(){sf(400,.12,"square",.08);setTimeout(()=>sf(600,.1,"square",.06),60)}
function pc(){sf(988,.08,"square",.07);setTimeout(()=>sf(1319,.12,"square",.07),80)}
function ps(){sf(200,.15,"sawtooth",.1)}
function ph(){sf(150,.3,"sawtooth",.1);setTimeout(()=>sf(100,.3,"sawtooth",.08),150)}
function pd(){sf(300,.2,"sawtooth",.12);setTimeout(()=>sf(200,.25,"sawtooth",.1),200);setTimeout(()=>sf(100,.4,"sawtooth",.08),450)}
function pf(){sf(523,.1,"square",.06);setTimeout(()=>sf(659,.1,"square",.06),100);setTimeout(()=>sf(784,.1,"square",.06),200);setTimeout(()=>sf(1047,.25,"square",.08),300)}
function pw(){const n=[523,587,659,784,880,1047];n.forEach((x,i)=>setTimeout(()=>sf(x,.18,"square",.07),i*120))}

// ====== INPUT ======
const K={};
let JP=false,JH=false,TL=false,TR=false,TJ=false;
let PAUSED=false,ENDED=false;

function kd(e){
  const k=e.key;
  K[k]=true;
  if(k===" "||k==="ArrowUp"||k==="w"||k==="W"){e.preventDefault();if(!JH){JP=true;JH=true;}}
  if(k==="Escape"&&!ENDED){PAUSED=!PAUSED;}
  if((k==="r"||k==="R")&&ENDED){restart();}
}
function ku(e){
  const k=e.key;
  K[k]=false;
  if(k===" "||k==="ArrowUp"||k==="w"||k==="W")JH=false;
}

addEventListener("keydown",kd);
addEventListener("keyup",ku);

["bl","br","bup","bj"].forEach(id=>{
  const el=document.getElementById(id);
  if(!el)return;
  function dn(e){e.preventDefault();
    if(id==="bl")TL=true;if(id==="br")TR=true;
    if(id==="bup"||id==="bj"){if(!JH){JP=true;JH=true;}}
  }
  function up(e){e.preventDefault();
    if(id==="bl")TL=false;if(id==="br")TR=false;
    if(id==="bup"||id==="bj")JH=false;
  }
  el.addEventListener("touchstart",dn,{passive:false});
  el.addEventListener("touchend",up,{passive:false});
  el.addEventListener("touchcancel",up);
  el.addEventListener("mousedown",dn);
  el.addEventListener("mouseup",up);
  el.addEventListener("mouseleave",up);
});

// ====== CONSTANTS ======
const T=32,G=.6,F=.82,MS=5,JF=-10.5;
const LW=200,LH=16;
let LV=[],PL=null,EN=[],CN=[],PT=[];
let CX=0,CY=0,FC=0;
let FLAG=false,WT=0;

// ====== LEVEL ======
function bl(){
LV=[];for(let y=0;y<LH;y++){LV[y]=[];for(let x=0;x<LW;x++){LV[y][x]=0;}}
const GR=14;
for(let x=0;x<LW;x++){LV[GR][x]=1;LV[GR+1][x]=1;}
// Platforms
function pl(x1,x2,row){for(let x=x1;x<=x2;x++)LV[row][x]=2;}
function qb(x,row){LV[row][x]=3;}
function pp(x,row){LV[row][x]=1;LV[row+1][x]=6;LV[row+2][x]=6;}
pl(16,19,10);pl(22,25,8);pl(28,31,11);pl(34,37,9);pl(42,44,7);pl(48,50,10);
qb(17,7);qb(24,5);qb(36,6);qb(50,7);
pp(6,11);pp(40,11);pp(76,11);pp(114,11);pp(154,11);
// Stairs
for(let s=0;s<6;s++){for(let r=14-s;r<=14;r++)LV[r][56+s]=1;LV[13-s][56+s]=2;}
pl(64,68,8);pl(72,74,6);pl(78,81,10);pl(84,87,7);pl(92,96,12);
pl(100,103,9);pl(108,111,8);pl(116,119,9);pl(124,127,7);pl(132,135,10);
for(let s=0;s<7;s++){for(let r=14-s;r<=14;r++)LV[r][140+s]=1;LV[13-s][140+s]=2;}
pl(148,151,9);pl(156,158,7);pl(162,165,10);pl(170,173,8);
// Flagpole
for(let r=8;r<=14;r++)LV[r][180]=4;
// Castle
for(let x=184;x<=188;x++){LV[10][x]=1;LV[11][x]=1;LV[12][x]=1;}
LV[9][185]=5;LV[9][186]=5;LV[9][187]=5;
// Ceiling
for(let x=1;x<180;x++)LV[0][x]=1;
}

// ====== ENTITIES ======
function mkP(){return{x:3*T,y:10*T,w:24,h:28,vx:0,vy:0,og:false,fc:1,f:0,ft:0,al:true,lv:3,iv:0};}
function spawnE(){
EN=[];const d=[[14,12],[20,7],[32,13],[46,9],[54,12],[70,7],[80,9],[90,12],[98,8],[106,7],[112,12],[122,8],[130,9],[138,12],[150,8],[160,9],[168,7],[175,12]];
d.forEach(p=>{EN.push({x:p[0]*T,y:p[1]*T,w:28,h:28,vx:1.2,vy:0,al:true,f:0,ft:0,ad:1});});}
function spawnC(){
CN=[];const d=[[9,12],[10,12],[11,12],[18,6],[23,4],[25,4],[30,10],[35,5],[37,5],[43,6],[44,6],[49,6],[50,6],[58,10],[65,7],[66,7],[67,7],[73,5],[79,9],[80,9],[85,6],[86,6],[93,11],[94,11],[95,11],[101,8],[102,8],[109,7],[110,7],[117,8],[118,8],[125,6],[126,6],[133,9],[134,9],[141,10],[149,8],[150,8],[157,6],[163,9],[164,9],[171,7]];
d.forEach(p=>{CN.push({x:p[0]*T+4,y:p[1]*T+4,w:16,h:16,c:false,b:Math.random()*6.28});});}

function spawnP(x,y,n,cl,sp,l){
for(let i=0;i<n;i++){let a=Math.random()*6.28,spd=(Math.random()*.5+.5)*sp;PT.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1,l:l||30,ml:l||30,cl:cl||"#f5c842",s:Math.random()*3+2});}}
function spawnCP(x,y){spawnP(x+8,y+8,8,"#f5c842",3,25);}
function spawnSP(x,y){spawnP(x+14,y+14,12,"#e74c3c",3,20);}

// ====== COLLISION ======
function rc(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function gt(c,r){if(c<0||c>=LW||r<0||r>=LH)return 1;return LV[r][c];}
function isS(c,r){const t=gt(c,r);return t===1||t===2||t===3||t===5||t===6;}

// ====== INIT ======
function init(){
bl();PL=mkP();spawnE();spawnC();PT=[];CX=0;CY=0;FLAG=false;WT=0;FC=0;PAUSED=false;ENDED=false;
}

// ====== RESTART ======
function restart(){init();}

// ====== UPDATE ======
function up(){
if(PAUSED||ENDED)return;
FC++;const p=PL;if(!p.al)return;
let mx=0;
if(K["ArrowLeft"]||K["a"]||K["A"]||K["ArrowLeft"]||TL)mx=-1;
if(K["ArrowRight"]||K["d"]||K["D"]||TR)mx=1;
if(JP&&p.og){p.vy=JF;p.og=false;pj();}
JP=false;
p.vx+=mx*.8;p.vx*=F;if(Math.abs(p.vx)>MS)p.vx=Math.sign(p.vx)*MS;if(Math.abs(p.vx)<.1)p.vx=0;if(mx!==0)p.fc=mx;
p.vy+=G;p.y+=p.vy;
p.x+=p.vx;
for(let r=Math.floor(p.y/T);r<=Math.floor((p.y+p.h-1)/T);r++){for(let c=Math.floor(p.x/T);c<=Math.floor((p.x+p.w-1)/T);c++){if(isS(c,r)){if(p.vx>0){p.x=c*T-p.w;p.vx=0;}else if(p.vx<0){p.x=(c+1)*T;p.vx=0;}}}}
p.y+=p.vy;p.og=false;
for(let r=Math.floor(p.y/T);r<=Math.floor((p.y+p.h-1)/T);r++){for(let c=Math.floor(p.x/T);c<=Math.floor((p.x+p.w-1)/T);c++){if(isS(c,r)){if(p.vy>0){p.y=r*T-p.h;p.vy=0;p.og=true;}else if(p.vy<0){p.y=(r+1)*T;p.vy=0;if(gt(c,r)===3){LV[r][c]=0;spawnCP(c*T,r*T);pc();}}}}}}
// Coins
CN.forEach(co=>{if(co.c)return;if(rc(p,co)){co.c=true;spawnCP(co.x,co.y);pc();}});
// Enemies
EN.forEach(e=>{if(!e.al)return;e.vy+=G;e.x+=e.vx*e.ad;e.y+=e.vy;
for(let r=Math.floor(e.y/T);r<=Math.floor((e.y+e.h-1)/T);r++){for(let c=Math.floor(e.x/T);c<=Math.floor((e.x+e.w-1)/T);c++){if(isS(c,r)){if(e.vx*e.ad>0){e.x=c*T-e.w;e.ad*=-1;}else if(e.vx*e.ad<0){e.x=(c+1)*T;e.ad*=-1;}}}}
let eg=false;
for(let r=Math.floor(e.y/T);r<=Math.floor((e.y+e.h-1)/T);r++){for(let c=Math.floor(e.x/T);c<=Math.floor((e.x+e.w-1)/T);c++){if(isS(c,r)){if(e.vy>0){e.y=r*T-e.h;e.vy=0;eg=true;}}}}
if(e.y>LH*T)e.al=false;
if(e.al&&p.al&&rc(p,e)){if(p.vy>0&&p.y+p.h-8<e.y+e.h/2){e.al=false;p.vy=-8;spawnSP(e.x,e.y);ps();}else if(p.iv<=0){p.al=false;ph();spawnP(p.x+p.w/2,p.y+p.h/2,15,"#e74c3c",4,30);setTimeout(()=>{if(p.lv>0){p.lv--;PL=mkP();PL.lv=p.lv;}else{ENDED=true;pd();}},1000);}}});
// Anims
p.ft++;if(p.ft>6){p.ft=0;p.f=(p.f+1)%4;}
EN.forEach(e=>{if(!e.al)return;e.ft++;if(e.ft>10){e.ft=0;e.f=(e.f+1)%2;}});
// Flagpole
if(!FLAG&&p.x>=180*T&&p.y<=12*T&&p.y>=8*T){FLAG=true;ENDED=true;pf();setTimeout(pw,600);WT=60;}
if(p.y>LH*T+64){p.al=false;pd();setTimeout(()=>{if(p.lv>0){p.lv--;PL=mkP();PL.lv=p.lv;}else{ENDED=true;}},800);}
// Camera
CX=p.x-W*.35;CY=p.y-H*.5;if(CX<0)CX=0;if(CX>LW*T-W)CX=LW*T-W;if(CY<0)CY=0;if(CY>LH*T-H)CY=LH*T-H;
// Particles
PT.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.05;pt.l--;});
PT=PT.filter(pt=>pt.l>0);
if(WT>0)WT--;
}

// ====== DRAW ======
function dr(){
x.clearRect(0,0,W,H);
const pr=Math.min(1,Math.max(0,(CX+W/2)/(LW*T)));
const r1=Math.floor(92+pr*60),g1=Math.floor(148+pr*40),b1=Math.floor(252-pr*40);
const sg=x.createLinearGradient(0,0,0,H);
sg.addColorStop(0,`rgb(${r1},${g1},${b1})`);sg.addColorStop(.6,`rgb(${r1-20},${g1-10},${b1+10})`);sg.addColorStop(1,`rgb(${r1-40},${g1-20},${b1-30})`);
x.fillStyle=sg;x.fillRect(0,0,W,H);
// Clouds
x.fillStyle="rgba(255,255,255,0.5)";
[[100,60,60,25],[250,90,80,30],[420,50,50,20],[580,80,70,28],[750,55,65,22],[920,85,75,30],[1100,60,55,20],[1280,80,65,25],[1450,50,70,28],[1620,75,60,22],[1800,65,80,30]].forEach(cp=>{
const cx=cp[0]-CX*.3;if(cx>-100&&cx<W+100){x.beginPath();x.ellipse(cx,cp[1],cp[2],cp[3],0,0,6.28);x.fill();x.beginPath();x.ellipse(cx+cp[2]*.6,cp[1]-8,cp[2]*.7,cp[3]*.8,0,0,6.28);x.fill();x.beginPath();x.ellipse(cx-cp[2]*.5,cp[1]-3,cp[2]*.6,cp[3]*.7,0,0,6.28);x.fill();}
});
// Hills
x.fillStyle="#4a7c3f";for(let i=0;i<12;i++){const hx=i*300-(CX*.2)%3600,hy=H-90,hw=120+((i*37)%60);x.beginPath();x.arc(hx,hy,hw,Math.PI,0);x.fill();}
x.fillStyle="#5a9c4f";for(let i=0;i<15;i++){const hx=i*250-(CX*.15)%3750,hy=H-85,hw=80+((i*41)%50);x.beginPath();x.arc(hx,hy,hw,Math.PI,0);x.fill();}
x.save();x.translate(-CX,-CY);
// Tiles
for(let y=0;y<LH;y++){for(let x=0;x<LW;x++){const t=LV[y][x];if(t===0)continue;const px=x*T,py=y*T;
switch(t){
case 1:x.fillStyle="#8B5E3C";x.fillRect(px,py,T-1,T-1);x.fillStyle="#7A4E2C";x.fillRect(px+1,py+1,T-3,T-3);x.fillStyle="#6B3F1F";for(let i=0;i<3;i++){x.fillRect(px+((x*7+i*13)%10)+2,py+((y*11+i*17)%10)+2,2,2);}break;
case 2:x.fillStyle="#C67B30";x.fillRect(px,py,T-1,T-1);x.fillStyle="#A06520";x.fillRect(px+1,py+1,T-3,6);x.fillRect(px+1,py+10,T-3,8);x.fillRect(px+1,py+21,T-3,6);x.fillStyle="#8B5E3C";x.fillRect(px+15,py+1,2,6);x.fillRect(px+15,py+10,2,8);x.fillRect(px+15,py+21,2,6);break;
case 3:x.fillStyle="#DAA520";x.fillRect(px,py,T-1,T-1);x.fillStyle="#B8860B";x.fillRect(px+2,py+2,T-5,T-5);x.fillStyle="#fff";x.font="bold 18px monospace";x.textAlign="center";x.textBaseline="middle";x.fillText("?",px+T/2,py+T/2);if(Math.sin(FC*.1+x+y)>.6){x.fillStyle="rgba(255,255,200,.5)";x.fillRect(px+3,py+3,5,5);x.fillRect(px+T-8,py+T-8,5,5);}break;
case 4:x.fillStyle="#7F8C8D";x.fillRect(px+14,py,4,T*6);x.fillStyle="#2ECC71";x.fillRect(px-4,py-2,28,16);const fw=Math.sin(FC*.1)*4;x.fillStyle="#e74c3c";x.beginPath();x.moveTo(px-4+fw,py-2);x.lineTo(px-20+fw,py+6+fw*.5);x.lineTo(px-4+fw,py+14);x.fill();break;
case 5:x.fillStyle="#7F8C8D";x.fillRect(px,py,T-1,T-1);x.fillStyle="#95A5A6";x.fillRect(px+2,py+2,6,6);x.fillRect(px+T-10,py+2,6,6);if(y===9){x.fillStyle="#8E44AD";x.fillRect(px+2,py+T-4,T-5,4);}break;
case 6:x.fillStyle="#27AE60";x.fillRect(px,py,T-1,T-1);x.fillStyle="#1E8449";x.fillRect(px,py,T-1,4);x.fillStyle="#2ECC71";x.fillRect(px+2,py+4,T-5,T-5);break;
}}}
// Coins
CN.forEach(co=>{if(co.c)return;const cy=co.y+Math.sin(FC*.08+co.b)*2;x.fillStyle="#f5c842";x.beginPath();x.arc(co.x+8,cy+8,7,0,6.28);x.fill();x.fillStyle="#f39c12";x.beginPath();x.arc(co.x+8,cy+8,4,0,6.28);x.fill();x.fillStyle="#e67e22";x.font="bold 12px monospace";x.textAlign="center";x.textBaseline="middle";x.fillText("$",co.x+8,cy+9);});
// Enemies
EN.forEach(e=>{if(!e.al)return;x.fillStyle="#e74c3c";x.fillRect(e.x+2,e.y,e.w-4,e.h-6);x.fillStyle="#c0392b";x.fillRect(e.x+4,e.y+4,e.w-8,e.h-12);x.fillStyle="#fff";const eo=e.ad>0?4:-4;x.fillRect(e.x+8+eo,e.y+6,5,5);x.fillRect(e.x+14+eo,e.y+6,5,5);x.fillStyle="#111";x.fillRect(e.x+9+eo,e.y+7,3,3);x.fillRect(e.x+15+eo,e.y+7,3,3);x.fillStyle="#8B4513";if(Math.floor(FC/10)%2===0){x.fillRect(e.x+4,e.y+e.h-4,8,4);x.fillRect(e.x+14,e.y+e.h-4,8,4);}else{x.fillRect(e.x+2,e.y+e.h-4,8,4);x.fillRect(e.x+16,e.y+e.h-4,8,4);}x.fillStyle="#922B21";x.fillRect(e.x+10,e.y+14,6,3);});
// Player
const p=PL;if(p.al||(!p.al&&FC%6<3)){x.save();if(p.iv>0&&FC%6<3)x.globalAlpha=.5;
x.fillStyle="#e74c3c";x.fillRect(p.x+2,p.y+4,p.w-4,14);
x.fillStyle="#2980b9";x.fillRect(p.x+2,p.y+14,p.w-4,10);
x.fillStyle="#f5cba7";x.fillRect(p.x+4,p.y-2,16,8);
x.fillStyle="#e74c3c";x.fillRect(p.x+2,p.y-6,20,6);x.fillRect(p.x+6,p.y-10,12,4);
const ed=p.fc>0?5:-5;x.fillStyle="#111";x.fillRect(p.x+8+ed,p.y+1,3,3);x.fillRect(p.x+13+ed,p.y+1,3,3);
x.fillStyle="#5D4037";x.fillRect(p.x+7,p.y+5,12,2);x.fillStyle="#e74c3c";x.fillRect(p.x+10,p.y+7,4,2);

ia();init();document.getElementById("menu").classList.add("hidden");

window.focus();

}
